<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Turretrix - Alien Invasion</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d0d12;
    color: #fff;
    text-align: center;
  }

  header {
    padding: 25px 0;
    background: #11131a;
    border-bottom: 2px solid #00ffc8;
  }

  header h1 {
    margin: 0;
    font-size: 2.4rem;
    color: #00ffc8;
  }

  .hero {
    padding: 60px 20px;
  }

  .hero h2 {
    font-size: 2rem;
    margin-bottom: 15px;
    color: #ffdd55;
  }

  .hero p {
    max-width: 600px;
    margin: 0 auto 30px;
    font-size: 1.1rem;
    line-height: 1.5;
    color: #dcdcdc;
  }

  .play-btn {
    display: inline-block;
    background: #00ffc8;
    color: #000;
    padding: 15px 28px;
    border-radius: 30px;
    font-size: 1rem;
    font-weight: bold;
    text-decoration: none;
    transition: 0.2s ease;
  }

  .play-btn:hover {
    transform: scale(1.05);
    background: #00e6b4;
  }

  footer {
    margin-top: 60px;
    padding: 20px;
    background: #11131a;
    color: #888;
    font-size: 0.9rem;
  }
</style>
</head>

<body>

<header>
  <h1>Turretrix: Alien Invasion</h1>
</header>

<section class="hero">
  <h2>Defend Earth from the Alien Swarm</h2>
  <p>
    Build and upgrade powerful turrets as waves of alien forces descend from the skies
    and rise from the ground. Hold the line and protect the last surviving city.
  </p>

  <a class="play-btn"
     href="https://play.google.com/store/apps/details?id=com.appjunglenet.turretrix&hl=en_US"
     target="_blank">
     Get it on Google Play
  </a>
</section>

<footer>
  © <script>document.write(new Date().getFullYear());</script> Turretrix. All rights reserved.
</footer>

</body>
</html>
