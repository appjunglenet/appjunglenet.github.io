    body {

    header {

      padding: 15px 30px;
      border-radius: 30px;
      font-weight: bold;
      text-transform: uppercase;
      text-decoration: none;
      box-shadow: 0 0 20px #00ffbf;
      transition: transform 0.2s ease;
    }
    .cta-button:hover {
      transform: scale(1.05);
    }
    footer {
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.8);
      font-size: 0.9em;
      color: #aaa;
    }
  </style>
</head>
