<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Turretrix - Alien Invasion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Defend the city from alien invaders in Turretrix - Alien Invasion. Download now on Google Play."
  />
  <link rel="icon" href="favicon.ico" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      background: radial-gradient(circle at top, #151b3b 0, #050712 55%, #020308 100%);
      color: #f5f7ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .page {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 18px 7vw;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      background: linear-gradient(
        to bottom,
        rgba(3, 6, 20, 0.95),
        rgba(3, 6, 20, 0.7),
        transparent
      );
      backdrop-filter: blur(10px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.95rem;
    }

    .logo-mark {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: conic-gradient(
        from 210deg,
        #00f5ff,
        #00ff85,
        #ffdd00,
        #ff3b6a,
        #00f5ff
      );
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 18px rgba(0, 255, 213, 0.6);
    }

    .logo-mark span {
      font-size: 0.8rem;
      font-weight: 900;
      color: #050712;
    }

    .header-cta a {
      padding: 9px 18px;
      border-radius: 999px;
      border: 1px solid rgba(0, 255, 170, 0.5);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #e9fffb;
      background: radial-gradient(circle at top left, #00ffbf33, transparent 60%);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .header-cta a span.icon {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid rgba(233, 255, 251, 0.6);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 7vw 60px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 1.1fr);
      gap: 40px;
      align-items: center;
      max-width: 1120px;
      width: 100%;
    }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
        text-align: center;
      }
      .hero-visual {
        order: -1;
      }
      header {
        padding-inline: 5vw;
      }
      main {
        padding-inline: 5vw;
      }
    }

    .hero-kicker {
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.7rem;
      color: #7ef9ff;
      margin-bottom: 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .hero-kicker::before {
      content: "";
      width: 32px;
      height: 1px;
      background: linear-gradient(to right, #00f5ff, transparent);
      opacity: 0.7;
    }

    .hero-title {
      font-size: clamp(2.4rem, 4vw, 3.2rem);
      line-height: 1.05;
      margin-bottom: 16px;
    }

    .hero-title span.highlight {
      background: linear-gradient(120deg, #00f5ff, #00ff85, #ffdd00);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero-subtitle {
      font-size: 1rem;
      line-height: 1.6;
      color: #c4c9ff;
      max-width: 460px;
      margin-bottom: 24px;
    }

    .hero-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 26px;
      font-size: 0.78rem;
      color: #a9b3ff;
    }

    .hero-badges span {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(121, 133, 255, 0.4);
      background: radial-gradient(circle at top, #1b2144, #050712);
    }

    .hero-cta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }

    @media (max-width: 900px) {
      .hero-subtitle {
        margin-inline: auto;
      }
      .hero-badges {
        justify-content: center;
      }
      .hero-cta {
        justify-content: center;
      }
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 13px 22px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #020308;
      background: linear-gradient(135deg, #00f5ff, #00ff85);
      box-shadow: 0 0 24px rgba(0, 255, 191, 0.5);
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
      box-shadow: 0 0 32px rgba(0, 255, 191, 0.7);
    }

    .btn-primary span.icon {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      background: #020308;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #00f5ff;
      font-size: 0.9rem;
    }

    .btn-ghost {
      border-radius: 999px;
      padding: 11px 18px;
      border: 1px solid rgba(151, 163, 255, 0.5);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #c4c9ff;
      background: radial-gradient(circle at top left, #1b2144, #050712);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-ghost span.dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #7ef9ff;
      box-shadow: 0 0 10px #7ef9ff;
    }

    .hero-visual {
      position: relative;
      min-height: 260px;
    }

    .card-main {
      position: relative;
      border-radius: 26px;
      padding: 20px 20px 18px;
      background: radial-gradient(circle at top, #252c5a, #050712);
      box-shadow:
        0 0 40px rgba(0, 0, 0, 0.8),
        0 0 60px rgba(0, 255, 191, 0.18);
      overflow: hidden;
    }

    .card-main::before {
      content: "";
      position: absolute;
      inset: -40%;
      background:
        radial-gradient(circle at 20% 0, rgba(0, 245, 255, 0.18), transparent 55%),
        radial-gradient(circle at 80% 0, rgba(0, 255, 133, 0.18), transparent 55%);
      opacity: 0.9;
      pointer-events: none;
    }

    .card-main-inner {
      position: relative;
      border-radius: 20px;
      border: 1px solid rgba(151, 163, 255, 0.4);
      padding: 16px 16px 14px;
      background: radial-gradient(circle at top, #11152f, #050712);
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 0.8rem;
      color: #c4c9ff;
    }

    .card-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .app-icon {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: conic-gradient(
        from 210deg,
        #00f5ff,
        #00ff85,
        #ffdd00,
        #ff3b6a,
        #00f5ff
      );
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 16px rgba(0, 255, 191, 0.6);
      flex-shrink: 0;
    }

    .app-icon span {
      font-size: 0.7rem;
      font-weight: 900;
      color: #050712;
    }

    .app-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .app-meta-title {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .app-meta-sub {
      font-size: 0.7rem;
      color: #8f9bff;
    }

    .card-header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }

    .rating {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.78rem;
    }

    .rating-stars {
      color: #ffd76a;
      font-size: 0.8rem;
    }

    .rating-count {
      font-size: 0.7rem;
      color: #8f9bff;
    }

    .tag-chip {
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid rgba(0, 245, 255, 0.5);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #7ef9ff;
    }

    .card-scene {
      position: relative;
      margin-top: 10px;
      border-radius: 16px;
      overflow: hidden;
      background: radial-gradient(circle at top, #1b2144, #050712);
      padding: 16px 14px 14px;
      border: 1px solid rgba(151, 163, 255, 0.35);
    }

    .city-silhouette {
      position: absolute;
      inset: auto 0 0;
      height: 40%;
      background: linear-gradient(to top, #050712, transparent);
      opacity: 0.9;
    }

    .
